name: Reusable — API client build

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        default: .

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build
        run: npm run build

      - name: Verify no localized runtime strings in src
        run: |
          if rg -n '"[^"]*(?:Bitte|Fehler| erfolgreich| nicht verfügbar)"' src/ 2>/dev/null; then
            echo "Localized UI strings found in public API client src/" >&2
            exit 1
          fi
          echo "OK — no obvious localized strings in src/"

      - uses: actions/upload-artifact@v4
        with:
          name: ignite-api-dist
          path: ${{ inputs.project-dir }}/dist
          retention-days: 14
